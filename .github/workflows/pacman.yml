name: Generate Pacman

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Run automatically every 24 hours
  schedule:
    - cron: "0 2 * * *"

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v3

      # Generates the pacman
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        id: pacman-gif
        with:
          github_user_name: akangumam
          outputs: |
            dist/pacman.svg
            dist/pacman-dark.svg?palette=github-dark&color_snake=#ffd700&color_dots=#ff69b4,#87ceeb,#98fb98,#f0e68c,#ffa07a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # show the status of the build. Makes it easier for debugging (if there's any issues).
      - run: git status

      # Push the content of <build_dir> to a branch
      # The content will be available at https://raw.githubusercontent.com/akangumam/akangumam/<target_branch>/<file>
      - name: Push pacman to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}